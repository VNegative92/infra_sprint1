version: '3.8'

services:
  db:
    image: postgres:15
    container_name: kittygram_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.db
    networks:
      - kittygram_network

  backend:
    build: ../backend
    container_name: kittygram_backend
    restart: always
    volumes:
      - ../backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
    env_file:
      - .env.backend
    networks:
      - kittygram_network
    ports:
      - "8000:8000"

  frontend:
    build: ../frontend
    container_name: kittygram_frontend
    restart: always
    volumes:
      - ../frontend:/app
      - frontend_build:/app/build
    networks:
      - kittygram_network

  nginx:
    image: nginx:alpine
    container_name: kittygram_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
      - /var/www/kittygram/static:/frontend
    depends_on:
      - backend
    networks:
      - kittygram_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  frontend_build:

networks:
  kittygram_network:
    driver: bridge
