version: '3.8'

services:
  db:
    image: postgres:15
    container_name: kittygram_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=kittygram
      - POSTGRES_USER=kittygram_user
      - POSTGRES_PASSWORD=kittygram_password
    networks:
      - kittygram_network

  backend:
    build: ../backend
    container_name: kittygram_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
    environment:
      - SECRET_KEY=ваш-секретный-ключ-придумайте-сложный
      - DEBUG=False
      - ALLOWED_HOSTS=158.160.253.163 localhost 127.0.0.1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=kittygram
      - DB_USER=kittygram_user
      - DB_PASSWORD=kittygram_password
      - DB_HOST=db
      - DB_PORT=5432
      - STATIC_ROOT=/app/static
      - MEDIA_ROOT=/app/media
    networks:
      - kittygram_network

  frontend:
    build: ../frontend
    container_name: kittygram_frontend
    restart: always
    networks:
      - kittygram_network

  nginx:
    image: nginx:alpine
    container_name: kittygram_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
      - /var/www/kittygram/static:/frontend
    depends_on:
      - backend
    networks:
      - kittygram_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  kittygram_network:
    driver: bridge
