server {
    listen 80;
    server_name _;

    location /static/ {
        alias /static/;
    }

    location /media/ {
        alias /media/;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        root /frontend;
        try_files $uri /index.html;
    }
}
